openapi: 3.0.0
info:
  title: Patient Dashboard API
  description: API for retrieving and managing patient dashboard data including appointments, prescriptions, medical tests, health summaries, and notifications
  version: 1.0.0
  contact:
    name: Healthcare System API Support
    email: api-support@healthcare-system.com

servers:
  - url: https://api.healthcare-system.com/v1
    description: Production Server
  - url: https://api-test.healthcare-system.com/v1
    description: Test Server

tags:
  - name: Patient Dashboard
    description: Endpoints for patient dashboard data
  - name: Appointments
    description: Patient appointment operations
  - name: Prescriptions
    description: Patient prescription operations
  - name: Medical Tests
    description: Patient medical test operations
  - name: Health Summary
    description: Patient health summary information
  - name: Notifications
    description: Patient notification operations
  - name: Profile Management
    description: Endpoints for managing patient profile information
  - name: Doctor Profile
    description: Endpoints for viewing doctor profiles and information
  - name: Appointment Management
    description: Endpoints for booking, viewing, and managing appointments

paths:
  /patients/{patientId}/dashboard:
    get:
      summary: Get complete patient dashboard data
      description: Retrieve all dashboard information for a specific patient in a single request
      tags:
        - Patient Dashboard
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
      responses:
        '200':
          description: Complete dashboard data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDashboard'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  
  /patients/{patientId}/appointments:
    get:
      summary: Get patient's upcoming appointments
      description: Retrieve all upcoming appointments for a patient
      tags:
        - Appointments
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
      responses:
        '200':
          description: Appointments retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  
  /patients/{patientId}/prescriptions:
    get:
      summary: Get patient's recent prescriptions
      description: Retrieve recent prescriptions for a patient
      tags:
        - Prescriptions
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
      responses:
        '200':
          description: Prescriptions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Prescription'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
          
  /patients/{patientId}/prescriptions/{prescriptionId}:
    get:
      summary: Get full prescription details
      description: Retrieve complete details of a specific prescription
      tags:
        - Prescriptions
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
        - name: prescriptionId
          in: path
          description: Unique identifier of the prescription
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Prescription details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionDetails'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  
  /patients/{patientId}/medical-tests:
    get:
      summary: Get patient's recent medical tests
      description: Retrieve recent medical tests for a patient
      tags:
        - Medical Tests
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
        - name: status
          in: query
          description: Filter by test status
          schema:
            type: string
            enum: [pending, reviewed, all]
            default: all
      responses:
        '200':
          description: Medical tests retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MedicalTest'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
          
  /patients/{patientId}/medical-tests/{testId}/report:
    get:
      summary: Get medical test report
      description: Download or view the medical test report
      tags:
        - Medical Tests
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
        - name: testId
          in: path
          description: Unique identifier of the medical test
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Test report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalTestDetails'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  
  /patients/{patientId}/health-summary:
    get:
      summary: Get patient's health summary
      description: Retrieve health summary information for a patient
      tags:
        - Health Summary
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
      responses:
        '200':
          description: Health summary retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSummary'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  
  /patients/{patientId}/notifications:
    get:
      summary: Get patient's notifications
      description: Retrieve all notifications for a patient
      tags:
        - Notifications
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
        - name: read
          in: query
          description: Filter by read status
          schema:
            type: string
            enum: [read, unread, all]
            default: all
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    
    patch:
      summary: Mark notifications as read
      description: Mark one or more notifications as read
      tags:
        - Notifications
      parameters:
        - $ref: '#/components/parameters/PatientIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: List of notification IDs to mark as read
              required:
                - notificationIds
      responses:
        '200':
          description: Notifications marked as read successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /patients/{patientId}/profile:
    get:
      summary: Get patient profile information
      description: Retrieve complete profile information for a patient
      tags:
        - Profile Management
      parameters:
        - name: patientId
          in: path
          description: Unique identifier of the patient
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Profile information retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      patientId:
                        type: string
                        format: uuid
                  - $ref: '#/components/schemas/PatientProfile'
                  
                      
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    
    put:
      summary: Update patient profile information
      description: Update the complete profile information for a patient
      tags:
        - Profile Management
      parameters:
        - name: patientId
          in: path
          description: Unique identifier of the patient
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientProfile'
      responses:
        '200':
          description: Profile information updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientProfile'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /doctors:
    get:
      summary: Get list of doctors
      description: Retrieve a list of doctors with basic information
      tags:
        - Doctor Profile
      parameters:
        - name: specialization
          in: query
          description: Filter by doctor specialization
          schema:
            type: string
        - name: location
          in: query
          description: Search doctor by location
          schema:
            type: string
      responses:
        '200':
          description: Doctors retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Doctor'
      
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /doctors/{doctorId}:
    get:
      summary: Get doctor profile
      description: Retrieve complete profile information for a specific doctor
      tags:
        - Doctor Profile
      parameters:
        - name: doctorId
          in: path
          description: Unique identifier of the doctor
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Doctor profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  

  /doctors/{doctorId}/reviews:
    get:
      summary: Get doctor reviews
      description: Retrieve patient reviews for a specific doctor
      tags:
        - Doctor Profile
      parameters:
        - name: doctorId
          in: path
          description: Unique identifier of the doctor
          required: true
          schema:
            type: string
            format: uuid
        - name: rating
          in: query
          description: Filter by rating
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: Doctor reviews retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DoctorReview'
                  summary:
                    type: object
                    properties:
                      averageRating:
                        type: number
                        format: float
                      totalReviews:
                        type: integer
                      ratingDistribution:
                        type: object
                        properties:
                          '1':
                            type: integer
                          '2':
                            type: integer
                          '3':
                            type: integer
                          '4':
                            type: integer
                          '5':
                            type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /appointments:
    post:
      summary: Book a new appointment
      description: Create a new appointment with a doctor
      tags:
        - Appointment Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
      responses:
        '201':
          description: Appointment booked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          description: Time slot is already booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /appointments/available-slots:
    get:
      summary: Get available appointment slots
      description: Retrieve available time slots for a specific doctor on a specific date
      tags:
        - Appointment Management
      parameters:
        - name: doctorId
          in: query
          description: Unique identifier of the doctor
          required: true
          schema:
            type: string
            format: uuid
        - name: location
          in: query
          description: Location of the appointment
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Available slots retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentState'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /appointments/{appointmentId}:
    get:
      summary: Get appointment details
      description: Retrieve details of a specific appointment
      tags:
        - Appointment Management
      parameters:
        - name: appointmentId
          in: path
          description: Unique identifier of the appointment
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Appointment details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    
    delete:
      summary: Cancel appointment
      description: Cancel an existing appointment
      tags:
        - Appointment Management
      parameters:
        - name: appointmentId
          in: path
          description: Unique identifier of the appointment
          required: true
          schema:
            type: string
            format: uuid
        - name: reason
          in: query
          description: Reason for cancellation
          schema:
            type: string
      responses:
        '204':
          description: Appointment cancelled successfully
        '400':
          description: Appointment cannot be cancelled (e.g., too close to appointment time)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /appointments/{appointmentId}/reschedule:
    post:
      summary: Reschedule appointment
      description: Reschedule an existing appointment to a new time slot
      tags:
        - Appointment Management
      parameters:
        - name: appointmentId
          in: path
          description: Unique identifier of the appointment
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newDateTime:
                  type: string
                  format: date-time
                  description: New date and time for the appointment
                reason:
                  type: string
                  description: Reason for rescheduling
              required:
                - newDateTime
      responses:
        '200':
          description: Appointment rescheduled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          description: Appointment cannot be rescheduled (e.g., too close to appointment time or new slot unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          description: Time slot is already booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    
  

components:
  parameters:
    PatientIdParam:
      name: patientId
      in: path
      description: Unique identifier of the patient
      required: true
      schema:
        type: string
        format: uuid
  
  schemas:
    PatientDashboard:
      type: object
      properties:
        appointments:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'
        prescriptions:
          type: array
          items:
            $ref: '#/components/schemas/Prescription'
        medicalTests:
          type: array
          items:
            $ref: '#/components/schemas/MedicalTest'
        healthSummary:
          $ref: '#/components/schemas/HealthSummary'
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        unreadNotificationsCount:
          type: integer
          description: Count of unread notifications
      
    Appointment:
      type: object
      properties:
        appointmentId:
          type: string
          format: uuid
        doctor:
          $ref: '#/components/schemas/Doctor'
        dateTime:
          type: string
          format: date-time
        duration:
          type: integer
          description: Duration in minutes
        location:
          $ref: '#/components/schemas/AppointmentLocation'
        serialNumber:
          type: integer
      required:
        - appointmentId
        - doctor
        - dateTime
        - location
        - serialNumber
    
    Prescription:
      type: object
      properties:
        prescriptionId:
          type: string
          format: uuid
        doctor:
          $ref: '#/components/schemas/Doctor'
        issuedDate:
          type: string
          format: date
        summary:
          type: string
          description: Short summary of the prescription
        status:
          type: string
          enum: [active, completed, cancelled]
      required:
        - prescriptionId
        - doctor
        - issuedDate
        - summary
        - status
    
    PrescriptionDetails:
      allOf:
        - $ref: '#/components/schemas/Prescription'
        - type: object
          properties:
            patient:
              $ref: '#/components/schemas/patient'
            vitals:
              type: object
              properties:
                bloodPressure:
                  $ref: '#/components/schemas/Measurement'
                weight:
                  $ref: '#/components/schemas/Measurement'
                glucose:
                  $ref: '#/components/schemas/Measurement'
                temperature:
                  $ref: '#/components/schemas/Measurement'
            symptoms: 
              type: array
              items:
                type: string
              description: Symptoms reported by the patient
              example:
                - "Headache"
                - "Nausea"
            diagnosis:
              type: array
              items:
                type: string
                description: List of diagnoses made by the doctor
              example:
                - "Hypertension"
                - "Diabetes"
            medications:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  dosage:
                    type: string
                  frequency:
                    type: string
                  duration:
                    type: string
                  instructions:
                    type: string
            notes:
              type: string
            nextAppointment:
              type: string
              description: Date and time of the next appointment
              
    MedicalTest:
      type: object
      properties:
        testId:
          type: string
          format: uuid
        name:
          type: string
        orderedBy:
          $ref: '#/components/schemas/Doctor'
        orderedDate:
          type: string
          format: date
        performedDate:
          type: string
          format: date
      required:
        - testId
        - name
        - orderedBy
        - performedDate

    
    MedicalTestDetails:
      allOf:
        - $ref: '#/components/schemas/MedicalTest'
        - type: object
          properties:
            patient:
              $ref: '#/components/schemas/patient'
            results:
              type: array
              items:
                $ref: '#/components/schemas/Measurement'
                type: object
                properties:
                  referenceRange:
                    type: object
                    properties:
                      male:
                        $ref: '#/components/schemas/Measurement'
                      female:
                        $ref: '#/components/schemas/Measurement'
                      children:
                        $ref: '#/components/schemas/Measurement'
                  flag:
                    type: string
                    enum: [normal, low, high, critical]
            notes:
              type: string
            performedBy:
              $ref: '#/components/schemas/Doctor'
            hospital:
              $ref: '#/components/schemas/Hospital'
            
    
    HealthSummary:
      type: object
      properties:
        demographics:
          type: object
          properties:
            age:
              type: integer
            gender:
              type: string
            bloodGroup:
              type: string
        chronicConditions:
          type: array
          items:
            type: object
            properties:
              condition:
                type: string
              diagnosedDate:
                type: string
                format: date
              severity:
                type: string
                enum: [mild, moderate, severe]
        allergies:
          type: array
          items:
            type: object
            properties:
              allergen:
                type: string
              reaction:
                type: string
              severity:
                type: string
                enum: [mild, moderate, severe]
        vitalStats:
          type: object
          properties:
            height:
              type: number
              format: float
            weight:
              type: number
              format: float
            bmi:
              type: number
              format: float
            lastUpdated:
              type: string
              format: date
      required:
        - demographics
    
    Notification:
      type: object
      properties:
        notificationId:
          type: string
          format: uuid
        type:
          type: string
          enum: [appointment, prescription, test-result, general]
        title:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
        relatedResourceId:
          type: string
          format: uuid
          description: ID of the related resource (e.g., appointmentId, prescriptionId, testId)
        relatedResourceType:
          type: string
          enum: [appointment, prescription, test-result, system]
      required:
        - notificationId
        - type
        - title
        - message
        - createdAt
        - read

    patient:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        name:
          type: string
        age:
          type: integer
        bloodType:
          type: string
      required:
        - patientId
        - name

    Doctor:
      type: object
      properties:
        doctorId:
          type: string
          format: uuid
        name:
          type: string
        specialization:
          type: string
        designation: 
          type: string 
        degrees:
            type: array
            items:
              type: object
              properties:
                degree:
                  type: string
                institution:
                  type: string
                year:
                  type: integer
              required:
                - degree
                - institution
      required:
        - doctorId
        - name
        - specialization
        - designation
        - degrees
    
    Hospital:
        type: object
        properties:
          id:
            type: string
            format: uuid
          name:
            type: string
          address:
            $ref: '#/components/schemas/Address'
          contactNumber:
            type: string
          email:
            type: string
            format: email
        required:
          - id
          - name
          - address

    Pagination:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items
        limit:
          type: integer
          description: Number of items per page
        offset:
          type: integer
          description: Current offset from the first item
        nextOffset:
          type: integer
          description: Offset for the next page (null if no more pages)

    Measurement:
      type: object
      properties:
        name:
          type: string
          description: Name of the measurement (e.g., weight, blood pressure)
        value:
          type: string
          description: The numeric measurement value
        unit:
          type: string
          description: Unit of measurement (e.g., kg, mg/dL, bpm)
      required:
        - name
        - value
        - unit

    Address:
      type: object
      properties:
        street:
          type: string
          description: Street address, house/building number
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
      required:
        - city
        - state
        - country

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
      required:
        - code
        - message

    PatientProfile:
      type: object
      properties:
        personalInfo:
          type: object
          properties:
            firstName:
              type: string
            middleName:
              type: string
            lastName:
              type: string
            dateOfBirth:
              type: string
              format: date
            gender:
              type: string
              enum: [male, female, other, prefer-not-to-say]
            profileImage:
              type: string
              format: uri
          required:
            - firstName
            - lastName
            - dateOfBirth
            - gender
        contactInfo:
          type: object
          properties:
            email:
              type: string
              format: email
            phone:
              type: string
            secondaryPhone:
              type: string
          required:
            - email
            - phone
        address:
          description: Address of the patient
          $ref: '#/components/schemas/Address'
          
      required:
        - patientId
        - personalInfo
        - contactInfo
        - address
        - createdAt
        - updatedAt

    DoctorProfile:
      allOf:
        - $ref: '#/components/schemas/Doctor'
        - type: object
          properties:
            degrees:
              type: array
              items:
                type: object
                properties:
                  degree:
                    type: string
                  institution:
                    type: string
                  year:
                    type: integer
                required:
                  - degree
                  - institution
            experience:
              type: integer
              description: Years of experience
            bio:
              type: string
            consultationFee:
              type: number
              format: float
            availableDays:
              type: array
              items:
                $ref: '#/components/schemas/TimeSlot'
          required:
            - degrees
            - experience
            
    DoctorSchedule:
      type: object
      properties:
        doctorId:
          type: string
          format: uuid
        timeSlots:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
      required:
        - doctorId
        - timeSlots

            
    TimeSlot:
      type: object
      properties:
        slotId:
          type: string
          format: uuid
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        availableDay:
          type: string
          enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
        hospital:
          $ref: '#/components/schemas/Hospital'
      required:
        - startTime
        - endTime
        - availableDay
        - hospital

    DoctorReview:
      type: object
      properties:
        reviewId:
          type: string
          format: uuid
        patientName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        visitDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required:
        - reviewId
        - patientName
        - rating
        - visitDate
        - createdAt

    AppointmentCreate:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        doctorId:
          type: string
          format: uuid
        slotId:
          type: string
          format: uuid
        dateTime:
          type: string
          format: date-time
      required:
        - patientId
        - doctorId
        - slotId
       
    AppointmentLocation:
      type: object
      properties:
        name:
          type: string
          description: Hospital or clinic name
        address:
          $ref: '#/components/schemas/Address'
        room:
          type: string
        floor:
          type: string
      required:
        - name
        - address

    AppointmentState:
      type: object
      properties:
        doctorId:
          type: string
          format: uuid
        slotState:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/TimeSlot'
              - type: object
                properties:
                  date:
                    type: string
                    format: date
                  available:
                    type: boolean
                  currentSerialNumber:
                    type: integer
                  expectedTime:
                    type: string
                    format: time
      required:
        - name
        - address

    PatientBasic:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
        profileImage:
          type: string
          format: uri
      required:
        - patientId
        - name

    
    
    
    
  
  responses:
    UnauthorizedError:
      description: Authentication credentials were missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    ForbiddenError:
      description: The authenticated user does not have permission to access the requested resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFoundError:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    BadRequestError:
      description: The request was invalid or malformed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    
  
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

security:
  - BearerAuth: []
  - ApiKeyAuth: []